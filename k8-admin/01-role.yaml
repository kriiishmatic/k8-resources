apiVersion : rbac.authorization.k8s.io/v1
kind : Role
metadata :
  name : trainee
  namespace : roboshop
rules :
- apiGroups : [""]
  resources : ["pods","configmaps","secrets","services"]
  verbs : ["get", "watch", "list"]

---
apiVersion : rbac.authorization.k8s.io/v1
kind : RoleBinding
metadata :
  name : trainee-binding
  namespace : roboshop
roleRef :
  apiGroup : rbac.authorization.k8s.io
  kind : Role
  name : trainee
subjects :
- kind: User
  name: jane 
  apiGroup: rbac.authorization.k8s.io