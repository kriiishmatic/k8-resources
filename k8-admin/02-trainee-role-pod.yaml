apiVersion : v1
kind : Pod
metadata :
  name : trainee-pod
  namespace : roboshop
  labels :
    app : trainee-pod
spec :
  containers :
  - name : trainee-container
    image : nginx:alpine
    ports :
    - containerPort : 80
---
apiVersion : v1
kind : Service
metadata :
  name : trainee-service
  namespace : roboshop
spec :
  selector :
    app : trainee-pod
  ports :
  - protocol : TCP
    port : 80
    targetPort : 80