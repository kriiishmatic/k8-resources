apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: roboshop-eks-cluster
  region: us-east-1

iam:
  withOIDC: true

  serviceAccounts:
    - metadata:
        name: ebs-csi-controller-sa
        namespace: kube-system
      roleName: AmazonEKS_EBS_CSI_DriverRole
      attachPolicyARNs:
        - arn:aws:iam::aws:policy/service-role/AmazonEBSCSIDriverPolicy

    - metadata:
        name: efs-csi-controller-sa
        namespace: kube-system
      roleName: AmazonEKS_EFS_CSI_DriverRole
      attachPolicyARNs:
        - arn:aws:iam::aws:policy/service-role/AmazonEFSCSIDriverPolicy

vpc:
  id: vpc-073f068d99a28006a

  subnets:
    public:
      us-east-1a:
        id: subnet-09e1785d7668c8762

      us-east-1b:
        id: subnet-0bd99b0dc81e73657

managedNodeGroups:
  - name: roboshop-ng-dev

    instanceType: t3.medium

    desiredCapacity: 2
    minSize: 2
    maxSize: 4

    labels:
      environment: dev
      project: roboshop

    ssh:
      allow: true
      publicKeyName: k8s-practice-key

    iam:
      attachPolicyARNs:
        - arn:aws:iam::aws:policy/AmazonEKSWorkerNodePolicy
        - arn:aws:iam::aws:policy/AmazonEKS_CNI_Policy
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

addons:
  - name: vpc-cni

  - name: coredns

  - name: kube-proxy

  - name: aws-ebs-csi-driver

  - name: aws-efs-csi-driver


---
#### After clsuter creation, we will create the below resources in the cluster using kubectl apply -f <manifest.yaml> ###########
