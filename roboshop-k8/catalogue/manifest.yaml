apiVersion: v1
kind: Service
metadata:
  name: catalogue
  namespace: roboshop
  labels:
    name: catalogue
    project: roboshop
    environment: dev
    tier: backend
spec:
  selector:
    name: catalogue
    project: roboshop
    environment: dev
    tier: backend
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: catalogue
  namespace: roboshop
  labels:
    name: catalogue
    project: roboshop
    environment: dev
    tier: backend
data:
  MONGO: "true"
  MONGO_URL: "mongodb://mongodb:27017/catalogue"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalogue
  namespace: roboshop
  labels:
    name: catalogue
    project: roboshop
    environment: dev
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      name: catalogue
      project: roboshop
      environment: dev
      tier: backend
  template:
    metadata:
      labels:
        name: catalogue
        project: roboshop
        environment: dev
        tier: backend
    spec:
      containers:
      - name: catalogue
        image: kriiishmatic/catalogue:v1
        imagePullPolicy: Always
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 3
        ports:
          - containerPort: 8080
        envFrom:
          - configMapRef:
              name: catalogue
