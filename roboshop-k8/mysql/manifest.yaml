apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: roboshop
  labels:
    name: mysql
    project: roboshop
    environment: dev
    tier: db
spec:
  selector:
    name: mysql
    project: roboshop
    environment: dev
    tier: db
  ports:
    - protocol: TCP
      port: 3306
      targetPort: 3306
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql
  namespace: roboshop
  labels:
    name: mysql
    project: roboshop
    environment: dev
    tier: db
data:
  my.cnf: |
    [mysqld]
    innodb_redo_log_capacity = 2G
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: roboshop
  labels:
    name: mysql
    project: roboshop
    environment: dev
    tier: db
spec:
  replicas: 1
  selector:
    matchLabels:
      name: mysql
      project: roboshop
      environment: dev
      tier: db
  template:
    metadata:
      labels:
        name: mysql
        project: roboshop
        environment: dev
        tier: db
    spec:
      containers:
      - name: mysql
        image: kriiishmatic/mysql:v1
        ports:
          - containerPort: 3306
        readinessProbe:
          tcpSocket:
            port: 3306
          initialDelaySeconds: 10 
          periodSeconds: 10
        livenessProbe:
          tcpSocket:
            port: 3306
          initialDelaySeconds: 10
          periodSeconds: 10

        volumeMounts:
              - name: mysql-config
                mountPath: /etc/mysql/conf.d/my.cnf
                subPath: my.cnf

      volumes:
        - name: mysql-config
          configMap:
            name: mysql