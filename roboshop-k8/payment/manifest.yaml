apiVersion: v1
kind: Service
metadata:
  name: payment
  namespace: roboshop
  labels:
    name: payment
    project: roboshop
    environment: dev
    tier: backend
spec:
  selector:
    name: payment
    project: roboshop
    environment: dev
    tier: backend
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: payment
  namespace: roboshop
  labels:
    name: payment
    project: roboshop
    environment: dev
    tier: backend
data:
  CART_HOST: "cart"
  CART_PORT: "8080"
  USER_HOST: "user"
  USER_PORT: "8080"
  AMQP_HOST: "rabbitmq"
  AMQP_USER: "roboshop"
  AMQP_PASS: "roboshop123"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment
  namespace: roboshop
  labels:
    name: payment
    project: roboshop
    environment: dev
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      name: payment
      project: roboshop
      environment: dev
      tier: backend
  template:
    metadata:
      labels:
        name: payment
        project: roboshop
        environment: dev
        tier: backend
    spec:
      containers:
      - name: payment
        image: kriiishmatic/payment:v1
        imagePullPolicy: Always
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 3
        ports:
            - containerPort: 8080
        envFrom:
          - configMapRef:
              name: payment
