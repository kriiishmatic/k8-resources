apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: roboshop
  labels:
    name: rabbitmq
    project: roboshop
    environment: dev
    tier: db
spec:
  selector:
    name: rabbitmq
    project: roboshop
    environment: dev
    tier: db
  ports:
    - protocol: TCP
      port: 5672
      targetPort: 5672
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: rabbitmq
  namespace: roboshop
  labels:
    name: rabbitmq
    project: roboshop
    environment: dev
    tier: db
data:
  RABBITMQ_DEFAULT_USER: "roboshop"
  RABBITMQ_DEFAULT_PASS: "roboshop123"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  namespace: roboshop
  labels:
    name: rabbitmq
    project: roboshop
    environment: dev
    tier: db
spec:
  replicas: 1
  selector:
    matchLabels:
      name: rabbitmq
      project: roboshop
      environment: dev
      tier: db
  template:
    metadata:
      labels:
        name: rabbitmq
        project: roboshop
        environment: dev
        tier: db
    spec:
      containers:
      - name: rabbitmq
        image: rabbitmq:3.0
        ports:
          - containerPort: 5672
        readinessProbe:
          tcpSocket:
            port: 5672
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          tcpSocket:
            port: 5672
          initialDelaySeconds: 10
          periodSeconds: 10
        envFrom:
        - configMapRef:
            name: rabbitmq