apiVersion: v1
kind: PersistentVolume
metadata:
  name: static-pv

spec:
  capacity:
    storage: 5Gi

  accessModes:
    - ReadWriteOnce

  persistentVolumeReclaimPolicy: Retain

  csi:
    driver: ebs.csi.aws.com
    volumeHandle: vol-09ac08e50d45135e4

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: static-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 4Gi
  volumeName: static-pv
---
apiVersion: v1
kind: Pod
metadata:
  name: static-pod
spec:
  containers:
    - name: static-container
      image: nginx
      volumeMounts:
        - name: static-volume
          mountPath: /app/static
  volumes:
    - name: static-volume
      persistentVolumeClaim:
        claimName: static-pvc
