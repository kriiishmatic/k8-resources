apiVersion : v1
kind : Pod
metadata :
  name : emptydir-pod
spec :
  containers :
  - name : emptydir-container
    image : nginx:latest
    volumeMounts :
    - name : emptydir-volume
      mountPath : /data
  - name : busybox-container
    image : busybox:latest
    command : ["sleep", "3600"]
    volumeMounts :
    - name : emptydir-volume
      mountPath : /mnt/data
      readOnly : true
  volumes :
  - name : emptydir-volume
    emptyDir : {}
      sizeLimit : "1Gi"

