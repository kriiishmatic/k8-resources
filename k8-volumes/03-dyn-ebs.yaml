apiVersion: storage.k8s.io/v1
kind: StorageClass

metadata:
  name: ebs-sc

provisioner: ebs.csi.aws.com

parameters:
  type: gp3
  csi.storage.k8s.io/fstype: ext4

volumeBindingMode: WaitForFirstConsumer

---
apiVersion: v1
kind: PersistentVolumeClaim

metadata:
  name: ebs-pvc-dynamic

spec:
  storageClassName: ebs-sc

  accessModes:
    - ReadWriteOnce

  resources:
    requests:
      storage: 3Gi
---
apiVersion: v1
kind: Pod
metadata:
  name: ebs-pod-dynamic
spec:
  containers:
    - name: ebs-container-dynamic
      image: nginx:latest 
      volumeMounts:
        - name: ebs-volume-dynamic
          mountPath: /app/ebs/dynamic
  volumes:
    - name: ebs-volume-dynamic
      persistentVolumeClaim:
        claimName: ebs-pvc-dynamic


